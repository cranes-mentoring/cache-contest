version: '3.7'

services:
  postgres:
    container_name: postgres-db
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  redis:
    image: 'bitnami/redis:latest'
    ports:
      - "6379:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_PORT_NUMBER=6379

  cf-db-service-1:
    container_name: cf-db-service-1
    image: ere/cf-db-service
    environment:
      SERVER_PORT: 1000
      MANAGEMENT_PORT: 1001
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1000:1000"
      - "1001:1001"
    depends_on:
      - prometheus
      - postgres

  cf-db-service-2:
    container_name: cf-db-service-2
    image: ere/cf-db-service
    environment:
      SERVER_PORT: 1002
      MANAGEMENT_PORT: 1003
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1002:1002"
      - "1003:1003"
    depends_on:
      - prometheus
      - postgres

  cf-service-1:
    container_name: cf-service-1
    image: ere/cf-service
    environment:
      SERVER_PORT: 1003
      MANAGEMENT_PORT: 1004
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1003:1003"
      - "1004:1004"
    depends_on:
      - prometheus
      - postgres

  cf-service-2:
    container_name: cf-service-2
    image: ere/cf-service
    environment:
      SERVER_PORT: 1005
      MANAGEMENT_PORT: 1006
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1005:1005"
      - "1006:1006"
    depends_on:
      - prometheus
      - postgres

  redis-service-1:
    container_name: redis-service-1
    image: ere/redis-service
    environment:
      SERVER_PORT: 1007
      MANAGEMENT_PORT: 1008
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1007:1007"
      - "1008:1008"
    depends_on:
      - prometheus
      - postgres
      - redis

  redis-service-2:
    container_name: redis-service-2
    image: ere/redis-service
    environment:
      SERVER_PORT: 1009
      MANAGEMENT_PORT: 1010
      SPRING_PROFILES_ACTIVE: stg
    ports:
      - "1009:1009"
      - "1010:1010"
    depends_on:
      - prometheus
      - postgres
      - redis

  # your-microservice:
  #   image: your-microservice-image
  #   container_name: your-microservice
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - SERVER_PORT=8080
  #     - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=prometheus
  #     - SPRING_PROFILES_ACTIVE=prod
  #   depends_on:
  #     - prometheus

volumes:
  grafana_data:
  postgres_data: